name: Cypress CI
on: [push]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
        # شيلنا continue-on-error من هنا عشان يديك علامة حمراء لو فشل

      - name: Upload Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: failure() # دي معناها: حتى لو الخطوة اللي فوق فشلت، نفذ الخطوة دي وارفع الصور
        with:
          name: cypress-screenshots
          path: cypress/screenshots